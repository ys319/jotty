name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build (macOS arm64)
    runs-on: macos-26
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build release binary
        run: swift build --arch arm64 -c release --product jotty

      - name: Package binary
        run: tar -czf jotty-${{ env.RELEASE_TAG }}-macos-arm64.tar.gz -C .build/arm64-apple-macosx/release jotty

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-arm64
          path: jotty-${{ env.RELEASE_TAG }}-macos-arm64.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-arm64
          path: ./artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: artifacts/jotty-*-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
